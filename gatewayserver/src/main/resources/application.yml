spring:
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071/"
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lowerCaseServiceId: true
          httpclient:
            connect-timeout: 1000
            response-timeout: 2s
  rabbitmq:
    host: "localhost"
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      connect-timeout: 2s
      host: localhost
      port: 6379
      timeout: 1s

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
  info:
    env:
      enabled: true

info:
  app:
    name: "gatewayserver"
    description: "Bank Gateway Server application"
    version: "1.0.0"

logging:
  level:
    com:
      bank:
        gatewayserver: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10  #Monitor 10 requests before open
        permitted-number-of-calls-in-half-open-state: 2  #testing 2 requests while it is open
        failure-rate-threshold: 50 # 50% fail it will move from close to open
        wait-duration-in-open-state: 1000 # espera 10 segundos antes de mudar de half para open